name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.combo }} / ${{ matrix.crypto }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        combo:
          - { name: DATA,       dc: ON,  audio: OFF, video: OFF }
          - { name: AUDIO,      dc: ON,  audio: ON,  video: OFF }
          - { name: MEDIA,      dc: ON,  audio: ON,  video: ON  }
          - { name: AUDIO_ONLY, dc: OFF, audio: ON,  video: OFF }
          - { name: MEDIA_ONLY, dc: OFF, audio: ON,  video: ON  }
          - { name: CORE_ONLY,  dc: OFF, audio: OFF, video: OFF }
        crypto: [mbedtls, openssl]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libmbedtls-dev libssl-dev

      - name: Configure
        run: |
          cmake -B build \
            -DNANORTC_FEATURE_DATACHANNEL=${{ matrix.combo.dc }} \
            -DNANORTC_FEATURE_AUDIO=${{ matrix.combo.audio }} \
            -DNANORTC_FEATURE_VIDEO=${{ matrix.combo.video }} \
            -DNANORTC_CRYPTO=${{ matrix.crypto }} \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  constraints:
    name: Architecture Constraints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libmbedtls-dev

      - name: "Check: no platform headers in src/"
        run: |
          ! grep -rn '#include <sys/' src/
          ! grep -rn '#include <pthread' src/
          ! grep -rn '#include <time\.h>' src/
          ! grep -rn '#include <unistd' src/
          ! grep -rn '#include <stdlib\.h>' src/

      - name: "Check: no dynamic allocation in src/"
        run: |
          ! grep -rn '\bmalloc\b' src/
          ! grep -rn '\bcalloc\b' src/
          ! grep -rn '\brealloc\b' src/

      - name: "Check: code formatting"
        run: |
          pip install clang-format==22.1.2
          clang-format --dry-run --Werror src/*.c src/*.h include/*.h crypto/*.h crypto/*.c

      - name: "Check: symbol naming"
        run: |
          cmake -B build -DNANORTC_FEATURE_DATACHANNEL=ON -DNANORTC_FEATURE_AUDIO=ON -DNANORTC_FEATURE_VIDEO=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j$(nproc)
          # All symbols must start with nano_/nanortc_ (public API) or a known module prefix (internal)
          ALLOWED='nano_|nanortc_|stun_|ice_|dtls_|nsctp_|sctp_|dc_|sdp_|rtp_|rtcp_|srtp_|jitter_|bwe_'
          violations=$(nm -g build/libnanortc.a 2>/dev/null | grep ' T ' | awk '{print $3}' | grep -v '^_' | grep -vE "^($ALLOWED)" || true)
          if [ -n "$violations" ]; then
            echo "Symbols with unknown prefix (expected nano_ or module prefix):"
            echo "$violations"
            exit 1
          fi

      - name: "Check: no global mutable state"
        run: |
          # B = uninitialized data, D = initialized data (both are mutable globals)
          violations=$(nm build/libnanortc.a 2>/dev/null | grep ' [BD] ' | grep -v '__' | grep -v 'crc32c_table' || true)
          if [ -n "$violations" ]; then
            echo "Global mutable state found:"
            echo "$violations"
            exit 1
          fi

      - name: "Check: DC-OFF has no SCTP symbols"
        run: |
          cmake -B build-nodc -DNANORTC_FEATURE_DATACHANNEL=OFF -DNANORTC_FEATURE_AUDIO=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-nodc -j$(nproc)
          violations=$(nm build-nodc/libnanortc.a 2>/dev/null | grep ' T ' | grep 'nsctp_' || true)
          if [ -n "$violations" ]; then
            echo "SCTP symbols found in DC-OFF build:"
            echo "$violations"
            exit 1
          fi

  sanitizer:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libmbedtls-dev

      - name: Configure (MEDIA + ASan)
        run: cmake -B build -DNANORTC_FEATURE_DATACHANNEL=ON -DNANORTC_FEATURE_AUDIO=ON -DNANORTC_FEATURE_VIDEO=ON -DCMAKE_BUILD_TYPE=Debug -DADDRESS_SANITIZER=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  interop:
    name: Interop (libdatachannel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libssl-dev

      - name: Configure
        run: |
          cmake -B build \
            -DNANORTC_BUILD_INTEROP_TESTS=ON \
            -DNANORTC_CRYPTO=openssl \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build -R interop --output-on-failure
