# Local coturn for nanortc relay-only interop tests.
#
# Start: ./scripts/start-test-turn.sh
# Stop : ./scripts/stop-test-turn.sh
#
# After start, run:
#   ctest --test-dir build-interop -L turn-relay --output-on-failure

services:
  coturn:
    image: coturn/coturn:4.6.2
    container_name: nanortc-test-coturn
    network_mode: host
    restart: unless-stopped
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
