# Minimal coturn configuration for nanortc relay-only interop tests.
#
# This is NOT a production config. It uses long-term credentials with a
# fixed username/password for deterministic local testing only.
#
# Default endpoint: 127.0.0.1:3478 UDP.
# Long-term credentials: testuser / testpass
# Realm: nanortc-test

# --- Listening ports ---
listening-port=3478
listening-ip=0.0.0.0

# --- Allocation address advertised to clients ---
# Inside the docker container, allocations bind to whatever the container's
# external interface is. We tell coturn to advertise 127.0.0.1 because the
# tests run on the same host and reach the container via localhost.
external-ip=127.0.0.1

# --- Relay port range (kept small; 4 channels × per-test pairs) ---
min-port=49160
max-port=49200

# --- Authentication: long-term credentials (RFC 8489 §9.2) ---
lt-cred-mech
realm=nanortc-test
user=testuser:testpass

# --- Logging ---
log-file=stdout
verbose
no-stdout-log
simple-log

# --- Disable everything we don't need ---
no-tls
no-dtls
no-cli
no-tcp-relay
no-multicast-peers
fingerprint
mobility

# --- Sane defaults for tests ---
no-loopback-peers
no-software-attribute
