<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>nanortc Browser Interop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; max-width: 800px; margin: 2em auto; padding: 0 1em; }
  h1 { font-size: 1.2em; margin-bottom: 1em; }

  /* Controls bar */
  .controls { display: flex; gap: 0.5em; align-items: center; flex-wrap: wrap; }
  .controls input[type=text] { flex: 1; min-width: 120px; padding: 4px; font-family: monospace; }
  .controls select, .controls button { padding: 4px 12px; cursor: pointer; }

  .status-bar { margin: 0.5em 0; }
  .status { font-weight: bold; }
  .ok { color: green; }
  .err { color: red; }
  .info { color: #666; }

  /* Sections with top labels */
  .section { margin: 1em 0; }
  .section-title { font-weight: bold; font-size: 0.9em; color: #333; margin-bottom: 0.3em; }

  /* Video: aspect-ratio container */
  .video-wrap {
    width: 100%; max-width: 640px;
    background: #000; border-radius: 4px; overflow: hidden;
  }
  .video-wrap video {
    display: block; width: 100%; height: auto;
    object-fit: contain; background: #000;
    cursor: pointer;
  }

  /* Audio */
  .section audio { width: 100%; max-width: 400px; }

  /* Message input */
  .msg-row { display: flex; gap: 0.5em; }
  .msg-row input[type=text] { flex: 1; padding: 4px; font-family: monospace; }
  .msg-row button { padding: 4px 12px; cursor: pointer; }

  /* Log */
  #log {
    border: 1px solid #ccc; padding: 8px; height: 240px; overflow-y: auto;
    white-space: pre-wrap; font-size: 0.85em; background: #f8f8f8;
    border-radius: 4px;
  }
</style>
</head>
<body>
<h1>nanortc Browser Interop</h1>

<div class="controls">
  <input type="text" id="sigUrl" value="">
  <select id="role">
    <option value="offerer">Offerer (browser creates DC)</option>
    <option value="answerer">Answerer (browser waits for DC)</option>
  </select>
  <button id="btnConnect" onclick="start()">Connect</button>
</div>

<div class="status-bar">
  <span id="status" class="status info">Not connected</span>
</div>

<div class="section">
  <div class="section-title">Video</div>
  <div class="video-wrap">
    <video id="remoteVideo" autoplay playsinline muted controls></video>
  </div>
</div>

<div class="section">
  <div class="section-title">DataChannel</div>
  <div class="msg-row">
    <input type="text" id="msgInput" placeholder="Type a message..." disabled>
    <button id="btnSend" onclick="sendMsg()" disabled>Send</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Log</div>
  <div id="log"></div>
</div>

<script>
// Auto-detect signaling server URL (same origin)
document.getElementById('sigUrl').value = location.origin;

let peerId = -1;
let pc = null;
let dc = null;
let pollTimer = null;
let pollAbort = null;

function log(cls, msg) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.textContent = text;
}

// --- HTTP signaling helpers ---

async function sigJoin(base) {
  const r = await fetch(base + '/join', {method: 'POST'});
  if (!r.ok) throw new Error('join failed: ' + r.status);
  const j = await r.json();
  return j.id;
}

async function sigSend(base, id, msg) {
  await fetch(base + '/send?id=' + id, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(msg)
  });
}

async function sigRecv(base, id, timeout, signal) {
  const r = await fetch(base + '/recv?id=' + id + '&timeout=' + timeout,
                        signal ? {signal} : undefined);
  if (r.status === 204) return null;
  if (!r.ok) throw new Error('recv error: ' + r.status);
  return await r.json();
}

async function sigLeave(base, id) {
  await fetch(base + '/leave?id=' + id, {method: 'POST'}).catch(() => {});
}

// --- Poll for signaling messages ---

function startPolling(base) {
  if (pollTimer) return;
  async function poll() {
    try {
      pollAbort = new AbortController();
      const msg = await sigRecv(base, peerId, 2, pollAbort.signal);
      if (msg) {
        log('info', 'Poll got: type=' + msg.type);
        await handleSignalingMessage(msg);
      }
    } catch(e) {
      if (e.name === 'AbortError') return; /* stopPolling() called */
      log('err', 'Poll error: ' + e.message);
    }
    if (pollTimer !== null) pollTimer = setTimeout(poll, 100);
  }
  pollTimer = setTimeout(poll, 100);
}

function stopPolling() {
  if (pollAbort) { pollAbort.abort(); pollAbort = null; }
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
}

// --- WebRTC ---

function setupDC(channel) {
  dc = channel;
  dc.onopen = () => {
    log('ok', 'DataChannel "' + dc.label + '" open');
    setStatus('ok', 'DataChannel open');
    document.getElementById('msgInput').disabled = false;
    document.getElementById('btnSend').disabled = false;
  };
  dc.onclose = () => {
    log('info', 'DataChannel closed');
    setStatus('info', 'DataChannel closed');
    document.getElementById('msgInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
  };
  dc.onmessage = (e) => {
    log('info', '< ' + e.data);
  };
}

async function handleSignalingMessage(msg) {
  if (msg.type === 'offer' && pc) {
    log('info', 'Got offer (' + msg.sdp.length + ' bytes)');
    await pc.setRemoteDescription({type: 'offer', sdp: msg.sdp});
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    log('info', 'Sending answer');
    await sigSend(document.getElementById('sigUrl').value, peerId,
                  {type: 'answer', sdp: pc.localDescription.sdp});
  } else if (msg.type === 'answer' && pc) {
    log('info', 'Got answer (' + msg.sdp.length + ' bytes)');
    await pc.setRemoteDescription({type: 'answer', sdp: msg.sdp});
  } else if (msg.type === 'candidate' && pc && msg.candidate) {
    log('info', 'Got ICE candidate');
    await pc.addIceCandidate({candidate: msg.candidate, sdpMid: '0', sdpMLineIndex: 0});
  }
}

async function start() {
  const base = document.getElementById('sigUrl').value;
  const role = document.getElementById('role').value;

  document.getElementById('btnConnect').disabled = true;
  setStatus('info', 'Joining signaling server...');

  try {
    peerId = await sigJoin(base);
    log('ok', 'Joined as peer ' + peerId);
  } catch(e) {
    log('err', 'Join failed: ' + e.message);
    setStatus('err', 'Join failed');
    document.getElementById('btnConnect').disabled = false;
    return;
  }

  // ICE servers: STUN + optional TURN from URL params (?turn=ip:port&tu=user&tp=pass)
  const params = new URLSearchParams(window.location.search);
  const iceServers = [{urls: 'stun:stun.cloudflare.com:3478'}];
  const turnServer = params.get('turn');
  const turnUser = params.get('tu');
  const turnPass = params.get('tp');
  if (turnServer && turnUser && turnPass) {
    iceServers.push({urls: 'turn:' + turnServer, username: turnUser, credential: turnPass});
    log('info', 'TURN: ' + turnServer + ' user=' + turnUser);
  }
  pc = new RTCPeerConnection({iceServers});

  pc.oniceconnectionstatechange = () => {
    log('info', 'ICE: ' + pc.iceConnectionState);
    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
      setStatus('ok', 'ICE connected');
    } else if (pc.iceConnectionState === 'failed') {
      setStatus('err', 'ICE failed');
    }
  };

  pc.ontrack = (e) => {
    log('ok', 'Got remote track: ' + e.track.kind);
    const video = document.getElementById('remoteVideo');
    if (e.streams && e.streams[0]) {
      // Use the WebRTC-associated stream (proper timing/sync)
      video.srcObject = e.streams[0];
    } else {
      // Fallback: manual stream for tracks without stream association
      if (!video.srcObject) {
        video.srcObject = new MediaStream();
      }
      video.srcObject.addTrack(e.track);
    }
    log('info', e.track.kind + ' track attached to player');
  };

  pc.onicecandidate = async (e) => {
    if (e.candidate) {
      let c = e.candidate.candidate;
      // Replace mDNS hostname with 127.0.0.1 (works for same-machine testing)
      c = c.replace(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\.local/g,
                     '127.0.0.1');
      await sigSend(base, peerId, {type: 'candidate', candidate: c});
      log('info', 'Sent ICE candidate: ' + c.substring(0, 80));
    } else {
      await sigSend(base, peerId, {type: 'candidate', candidate: ''});
      log('info', 'Sent end-of-candidates');
    }
  };

  startPolling(base);

  if (role === 'offerer') {
    // Browser is offerer: create DC + offer
    dc = pc.createDataChannel('test');
    setupDC(dc);
    log('info', 'Created DataChannel "test"');

    // Add audio: try sendrecv with microphone, fall back to recvonly
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      stream.getAudioTracks().forEach(t => pc.addTrack(t, stream));
      log('info', 'Added audio track (sendrecv via microphone)');
    } catch (e) {
      pc.addTransceiver('audio', {direction: 'recvonly'});
      log('warn', 'Microphone unavailable, audio recvonly: ' + e.message);
    }

    // Add video transceiver for receiving remote video
    pc.addTransceiver('video', {direction: 'recvonly'});
    log('info', 'Added video transceiver (recvonly)');

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    log('info', 'Sending offer');
    await sigSend(base, peerId, {type: 'offer', sdp: pc.localDescription.sdp});
    setStatus('info', 'Offer sent, waiting for answer...');
  } else {
    // Browser is answerer: wait for remote DC
    pc.ondatachannel = (e) => {
      log('info', 'Got remote DataChannel "' + e.channel.label + '"');
      setupDC(e.channel);
    };
    setStatus('info', 'Waiting for offer from remote...');
  }
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg || !dc || dc.readyState !== 'open') return;
  dc.send(msg);
  log('ok', '> ' + msg);
  input.value = '';
}

document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMsg();
});

window.addEventListener('beforeunload', () => {
  stopPolling();
  if (peerId >= 0) {
    const base = document.getElementById('sigUrl').value;
    navigator.sendBeacon(base + '/leave?id=' + peerId);
  }
});
</script>
</body>
</html>
